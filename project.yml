# XcodeGen 配置文件
# 在 Mac 上执行 `xcodegen` 命令即可生成 .xcodeproj
# 用于 GitHub Actions 自动构建

name: BBA
options:
  bundleIdPrefix: com.bba
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BBA:
    type: application
    platform: iOS
    sources:
      - path: BBA
        excludes:
          - "**/.DS_Store"
    resources:
      - path: BBA/Resources/MilestoneTemplates.json
        type: file
    info:
      path: BBA/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        CFBundleDisplayName: BBA
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: "BBA 需要访问你的照片库,来保存宝宝的照片和视频。"
        NSCameraUsageDescription: "BBA 需要使用相机来记录宝宝的高光时刻。"
        NSMicrophoneUsageDescription: "BBA 需要使用麦克风来录制宝宝的视频声音。"
        NSUserNotificationsUsageDescription: "BBA 通过通知提醒你记录喂养、用药、宝宝睡眠等重要时刻。"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bba.BBA
        PRODUCT_NAME: BBA
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
