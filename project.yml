# XcodeGen 配置文件
# 在 Mac 上执行 `xcodegen` 命令即可生成 .xcodeproj
# 用于 GitHub Actions 自动构建

name: BBA
options:
  bundleIdPrefix: com.bba
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  BBA:
    type: application
    platform: iOS
    sources:
      - path: BBA
        excludes:
          - "**/.DS_Store"
          - "Resources/Info.plist"
          - "Resources/Preview Content/**"
    info:
      path: BBA/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bba.BBA
        PRODUCT_NAME: BBA
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: '"BBA/Resources/Preview Content"'
        ENABLE_PREVIEWS: YES
