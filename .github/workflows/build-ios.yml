name: Build iOS

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"

jobs:
  build:
    name: Build BBA
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: |
          echo "All Xcode installations:"
          ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode found in /Applications"
          echo ""
          echo "Current default Xcode:"
          xcode-select -p 2>/dev/null || echo "No default set"
          echo ""
          xcodebuild -version 2>/dev/null || echo "No active Xcode"

      - name: Select latest Xcode
        run: |
          # 找系统里最新的 Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            echo "📌 Using: $LATEST_XCODE"
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          else
            echo "⚠️ No Xcode found, relying on default"
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          echo "📦 正在安装 xcodegen..."
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          else
            echo "✅ xcodegen 已安装: $(xcodegen --version)"
          fi

      - name: Generate Xcode Project
        run: |
          echo "📂 项目结构预览:"
          find . -type f -not -path './.git/*' -not -path './build/*' | head -20
          echo ""
          echo "🔨 生成 Xcode 工程..."
          xcodegen generate --spec project.yml --no-env

      - name: Verify project generated
        run: |
          ls -la BBA.xcodeproj/
          echo ""
          echo "📋 schemes:"
          xcodebuild -project BBA.xcodeproj -list

      - name: Build for Simulator
        run: |
          echo "🔨 开始编译..."
          set -o pipefail && xcodebuild \
            -project BBA.xcodeproj \
            -scheme BBA \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log | grep -E "(error:|warning:|note:|FAILED)" | head -80
          echo ""
          echo "=== 完整日志已保存到 build.log ==="
          echo "=== 如果上面没显示完整错误,本地查看 build.log ==="

      - name: Locate built .app
        id: locate
        run: |
          APP_PATH=$(find build -name "BBA.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 找不到 BBA.app!"
            echo "Build 目录内容:"
            find build -type d 2>/dev/null | head -20 || echo "build 目录不存在"
            exit 1
          fi
          echo "APP_PATH=$APP_PATH" >> $GITHUB_OUTPUT
          echo "✅ Built app at: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Compress .app for distribution
        run: |
          cd "$(dirname '${{ steps.locate.outputs.APP_PATH }}')"
          zip -r BBA-unsigned.zip "$(basename '${{ steps.locate.outputs.APP_PATH }}')"
          ls -la BBA-unsigned.zip

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: BBA-unsigned
          path: BBA-unsigned.zip
          if-no-files-found: error
          retention-days: 14

      - name: Build summary
        if: always()
        run: |
          echo "### 📱 BBA Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 **编译成功!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "1. 在页面底部 **Artifacts** 下载 \`BBA-unsigned.zip\`" >> $GITHUB_STEP_SUMMARY
            echo "2. 解压得到 \`BBA.app\`" >> $GITHUB_STEP_SUMMARY
            echo "3. 接下来用 AltStore 装到 iPhone(见 DEPLOY_GUIDE.md)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **编译失败**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请滚到日志找到带 ❌ 的步骤,把错误信息截图或复制发给我" >> $GITHUB_STEP_SUMMARY
          fi
